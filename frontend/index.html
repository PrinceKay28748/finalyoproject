<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Improved viewport for all mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <title>UG Navigator</title>
    <meta name="description" content="Context-aware campus navigation for the University of Ghana, Legon. Find optimal routes based on accessibility, safety, and real-time conditions." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://overpass-api.de" />
    <link rel="preconnect" href="https://nominatim.openstreetmap.org" />

    <!-- font-display=swap prevents font from blocking render -->
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
